<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NG Computer - Exam Activation Portal</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .iframe-container {
      position: absolute;
      left: 0;
      width: 100%;
      /* Mobile aur Desktop dono me click enable karne ke liye */
      pointer-events: auto; 
      
      top: -30px; 
      height: calc(100% + 30px); 
    }

    @media (max-width: 600px) {
      .iframe-container {
        top: -50px; 
        height: calc(100% + 50px);
      }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      /* Iframe ke andar clicking allow karne ke liye */
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbzTsCB9eU3fbGkE0SGq81we8afNP0DNLkMM2wyvNyebyizPIWwV5fWHi04lBk25XxxmNw/exec"></iframe>
  </div>

</body>
</html>
