<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NG Computer - Exam Activation Portal</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0f4f8;
    }

    .wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Ye iframe ke upar wale hisse ko kat dega */
    }

    iframe {
      width: 100%;
      /* Iframe ko 50px lamba kiya aur usko -50px margin se upar khiska diya */
      height: calc(100% + 50px); 
      margin-top: -50px; 
      border: none;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <iframe src="https://script.google.com/macros/s/AKfycbzTsCB9eU3fbGkE0SGq81we8afNP0DNLkMM2wyvNyebyizPIWwV5fWHi04lBk25XxxmNw/exec"></iframe>
  </div>

</body>
</html>
